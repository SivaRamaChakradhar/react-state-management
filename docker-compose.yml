version: "3.9"

services:
  react-state-management:
    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "8080:80"

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s